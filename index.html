<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoCal Fishing Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bulma/0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <nav class="navbar is-primary" role="navigation">
        <div class="navbar-brand">
            <a class="navbar-item" href="./">
                <i class="fas fa-fish mr-2"></i>
                <span class="has-text-weight-bold">SoCal Fishing Dashboard</span>
            </a>
        </div>
    </nav>

    <section class="section">
        <div class="container">
            <div id="reportsSection"></div>
            <div id="trendsSection"></div>

            <footer class="mt-6 has-text-centered has-text-grey">
                <p id="lastUpdated">Last updated: Loading...</p>
                <p class="mt-2" style="font-size: 12px;">
                    Data scraped every 12 hours from
                    <a href="https://www.sandiegofishreports.com/" target="_blank" rel="noopener">sandiegofishreports.com</a>.
                </p>
                <p class="mt-2">
                    <a href="https://github.com/alando93/fishing-report-app" target="_blank" rel="noopener">
                        <i class="fab fa-github mr-1"></i>View on GitHub
                    </a>
                </p>
            </footer>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="static/js/moon.js"></script>
    <script src="static/js/ui.js"></script>
    <script src="static/js/trends.js"></script>
    <script src="static/js/dashboard.js"></script>
</body>
</html>
